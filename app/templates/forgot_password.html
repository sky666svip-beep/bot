<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - 智能答题助手</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <style>
        .input-group-custom {
            display: flex;
            gap: 10px;
        }
        .input-group-custom .form-control {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-subtitle">通过绑定的邮箱重置您的密码</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert-error">
                        <i class="fas fa-exclamation-circle"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div style="margin-bottom: 1rem;">
                <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: #475569;">绑定的邮箱</label>
                <input type="email" id="email" name="email" class="form-control" required autofocus placeholder="输入您注册或绑定时的邮箱">
            </div>

            <div style="margin-bottom: 1rem;">
                <label for="email_code" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: #475569;">邮箱验证码</label>
                <div class="input-group-custom">
                    <input type="text" id="email_code" name="email_code" class="form-control" required placeholder="6位数字验证码">
                    <button type="button" id="send-code-btn" class="btn-auth" style="width: auto; padding: 0 1rem; white-space: nowrap; font-size: 0.9rem;">获取验证码</button>
                </div>
            </div>

            <div style="margin-bottom: 1rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: #475569;">新密码</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="输入新密码 (至少6位)">
            </div>

            <div style="margin-bottom: 2rem;">
                <label for="confirm" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: #475569;">确认新密码</label>
                <input type="password" id="confirm" name="confirm" class="form-control" required placeholder="再次输入新密码">
            </div>

            <button type="submit" class="btn-auth">
                <i class="fas fa-key me-2"></i> 重置密码
            </button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('auth.login') }}"><i class="fas fa-arrow-left me-1"></i> 返回登录</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('email');
            const sendCodeBtn = document.getElementById('send-code-btn');

            sendCodeBtn.addEventListener('click', async () => {
                const email = emailInput.value.trim();
                const emailRegex = /^\S+@\S+\.\S+$/;
                
                if (!emailRegex.test(email)) {
                    alert('请输入有效的邮箱地址');
                    return;
                }

                sendCodeBtn.disabled = true;
                sendCodeBtn.textContent = '发送中...';

                try {
                    const response = await fetch('/api/auth/send_code', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email: email, purpose: 'reset_password' })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        alert('验证码发送成功，请前往邮箱查看。');
                        startCountdown(60);
                    } else {
                        alert(result.message || '发送失败，请重试');
                        resetButton();
                    }
                } catch (err) {
                    alert('网络错误，请稍后重试');
                    resetButton();
                }
            });

            function startCountdown(seconds) {
                let remaining = seconds;
                sendCodeBtn.disabled = true;
                
                const timer = setInterval(() => {
                    sendCodeBtn.textContent = `${remaining} 秒后重试`;
                    remaining--;
                    
                    if (remaining < 0) {
                        clearInterval(timer);
                        resetButton();
                    }
                }, 1000);
            }

            function resetButton() {
                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = '获取验证码';
            }
        });
    </script>
</body>
</html>
