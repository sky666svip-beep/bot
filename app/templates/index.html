<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>自动答题助手</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ range(1, 1000) | random }}">
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
	<div id="sakura-container"></div>
	<div class="clock-container">
		<span id="hour" class="clock-unit">00</span><span class="colon">:</span>
		<span id="minute" class="clock-unit">00</span><span class="colon">:</span>
		<span id="second" class="clock-unit">00</span>
	</div>
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-lg-9 col-md-11">
				<div class="card main-card p-4 mb-4 slide-in">
					<div class="text-center mb-4">
						<h2 class="fw-bold text-primary gradient-text">自动答题助手</h2>
						<p class="text-muted small">基于 LLM 矩阵运算与视觉大模型的全能解题引擎</p>
					</div>
					<div class="mb-3 position-relative">
						<textarea id="rawText" class="form-control custom-textarea" rows="4" placeholder="✨ 请在此输入题目文本，或粘贴题目内容..."></textarea>
						<button class="btn btn-sm btn-light position-absolute top-0 end-0 m-2" onclick="document.getElementById('rawText').value=''" title="清空">
							<i class="fas fa-times"></i>
						</button>
					</div>
					<div class="row g-2 mb-3">
						<div class="col-md-6">
							<button id="submitBtn" class="btn btn-modern btn-primary-gradient w-100 h-100" onclick="SearchEngine.processAndSolve()">
								<i class="fas fa-search me-2"></i> 立即搜题 </button>
						</div>
						<div class="col-md-3">
							<input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="SearchEngine.handleImageUpload()">
							<button class="btn btn-modern btn-info-soft w-100 h-100" onclick="document.getElementById('imageUpload').click()">
								<i class="fas fa-camera me-2"></i> 图片识别 </button>
						</div>
						<div class="col-md-3">
							<input type="file" id="docUpload" accept=".pdf,.docx,.txt" style="display: none;" onchange="SearchEngine.handleDocUpload()">
							<button class="btn btn-modern btn-outline-primary w-100 h-100" onclick="document.getElementById('docUpload').click()" style="border-radius: 12px; border-width: 2px;">
								<i class="fas fa-file-pdf me-2"></i> 文档识别 </button>
						</div>
					</div>
					<div id="statusMessage" class="alert alert-info text-center py-2" style="display: none;">
						<div class="spinner-border spinner-border-sm me-2"></div>
						<span id="statusText">正在思考中...</span>
					</div>
				</div>
				<div id="resultArea" class="mt-4 mb-4 animate__animated animate__fadeIn" style="display: none;">
				<div class="card shadow-sm border-0 overflow-hidden">
					<div class="card-header bg-light d-flex justify-content-between align-items-center py-3">
						<div>
							<span id="sourceBadge" class="badge bg-primary">智能检索</span>
						</div>
						<div class="d-flex align-items-center">
							<button id="toggleMistakeBtn" class="btn btn-sm btn-outline-secondary ms-2" title="加入错题本">
								<i class="far fa-star"></i>
							</button>
						</div>
					</div>
					<div class="card-body">
						<div class="d-flex justify-content-between align-items-center mb-3">
							<h6 class="card-title mb-0 text-success">
								<i class="fas fa-check-circle me-2"></i>正确答案
							</h6>
							<button class="btn btn-sm btn-outline-success border-0" onclick="copyAnswer()">
								<i class="far fa-copy me-1"></i><span id="copyTip">复制</span>
							</button>
						</div>
						<div class="p-3 bg-success-subtle text-success rounded border border-success-subtle fw-bold" id="targetAnswer"> 等待搜索... </div>
					</div>
					<div class="card-footer bg-white p-4">
						<h6 class="fw-bold mb-3"><i class="fas fa-book-open me-2 text-primary"></i>题目解析</h6>
						<div id="explanation" class="reason-text text-secondary leading-relaxed">
						</div>
					</div>
				</div>
			</div>
				<div class="category-nav-container mb-5 slide-in" style="animation-delay: 0.1s;">
					<div class="row row-cols-2 row-cols-md-5 g-2 g-md-3 position-relative">
						<div class="col position-relative">
							<button class="nav-category-btn" type="button" data-bs-toggle="collapse" data-bs-target="#menuChinese" aria-expanded="false">
								<div class="icon-box bg-danger-subtle text-danger rounded-circle">
									<i class="fas fa-book"></i>
								</div>
								<h6 class="fw-bold text-dark">语文</h6>
							</button>
							<div class="collapse compact-sub-menu" id="menuChinese">
								<a href="{{ url_for('main.essay_correction_page') }}" class="sub-func-btn-compact">
									<i class="fas fa-pen-nib text-danger"></i>
									<span>作文批改</span>
								</a>
								<a href="https://zwsc8.com/" target="_blank" class="sub-func-btn-compact">
                                    <i class="fas fa-book text-danger"></i>
                                    <span>作文大全</span>
                                </a>
								<a href="{{ url_for('main.poetry_page') }}" class="sub-func-btn-compact">
									<i class="fas fa-scroll text-danger"></i>
									<span>诗词鉴赏</span>
								</a>
							</div>
						</div>
						<div class="col position-relative">
							<button class="nav-category-btn" type="button" data-bs-toggle="collapse" data-bs-target="#menuMath" aria-expanded="false">
								<div class="icon-box bg-primary-subtle text-primary rounded-circle">
									<i class="fas fa-square-root-alt"></i>
								</div>
								<h6 class="fw-bold text-dark">数学</h6>
							</button>
							<div class="collapse compact-sub-menu" id="menuMath">
								<a href="/formulas" class="sub-func-btn-compact">
									<i class="fas fa-atom text-primary"></i>
									<span>公式手册</span>
								</a>
								<a href="/calculator" class="sub-func-btn-compact">
									<i class="fas fa-calculator text-primary"></i>
									<span>计算器</span>
								</a>
							</div>
						</div>
						<div class="col position-relative">
							<button class="nav-category-btn" type="button" data-bs-toggle="collapse" data-bs-target="#menuEnglish" aria-expanded="false">
								<div class="icon-box bg-info-subtle text-info rounded-circle">
									<i class="fas fa-language"></i>
								</div>
								<h6 class="fw-bold text-dark">英语</h6>
							</button>
							<div class="collapse compact-sub-menu" id="menuEnglish">
								<a href="{{ url_for('main.essay_correction_page') }}" class="sub-func-btn-compact">
									<i class="fas fa-spell-check text-info"></i>
									<span>作文批改</span>
								</a>
								<a href="https://www.tingclass.net/zuowen/" target="_blank" class="sub-func-btn-compact">
									<i class="fas fa-globe text-info"></i>
									<span>作文大全</span>
								</a>
							</div>
						</div>
						<div class="col position-relative">
							<button class="nav-category-btn" type="button" data-bs-toggle="collapse" data-bs-target="#menuTools" aria-expanded="false">
								<div class="icon-box bg-secondary-subtle text-secondary rounded-circle">
									<i class="fas fa-toolbox"></i>
								</div>
								<h6 class="fw-bold text-dark">学习工具</h6>
							</button>
							<div class="collapse compact-sub-menu menu-end" id="menuTools" style="right: 0; left: auto;">
								<a href="{{ url_for('main.view_history') }}" class="sub-func-btn-compact">
									<i class="fas fa-history text-secondary"></i>
									<span>历史记录</span>
								</a>
								<a href="/simulation-exam" class="sub-func-btn-compact">
									<i class="fas fa-clipboard-check text-secondary"></i>
									<span>模拟测试</span>
								</a>
								<a href="{{ url_for('main.study_plan_page') }}" class="sub-func-btn-compact">
									<i class="fas fa-calendar-alt text-secondary"></i>
									<span>学习计划</span>
								</a>
								<a href="https://www.kiddoworksheets.com/" target="_blank" class="sub-func-btn-compact">
                                    <i class="fas fa-book text-secondary"></i>
                                    <span>练习本定制</span>
								</a>
							</div>
						</div>
						<div class="col">
							<button class="nav-category-btn" onclick="Notebook.refreshAll(); new bootstrap.Offcanvas(document.getElementById('notebookDrawer')).show();">
								<div class="icon-box bg-warning-subtle text-warning rounded-circle">
									<i class="fas fa-edit"></i>
								</div>
								<h6 class="fw-bold text-dark">错题本</h6>
							</button>
						</div>
					</div>
				</div>
			</div>

			<div class="row slide-in" style="animation-delay: 0.2s;">
				<div class="col-md-6 mb-3">
					<div class="card main-card p-3 h-100">
						<h6 class="text-primary fw-bold mb-3"><i class="fas fa-chart-pie me-2"></i>知识点分布</h6>
						<div id="pieChart" style="width: 100%; height: 250px;"></div>
					</div>
				</div>
				<div class="col-md-6 mb-3">
					<div class="card main-card p-3 h-100">
						<h6 class="text-primary fw-bold mb-3"><i class="fas fa-fire me-2"></i>学习热力图</h6>
						<div id="heatmapChart" style="width: 100%; height: 250px;"></div>
					</div>
				</div>
			</div>
			<p class="text-center mt-4 text-muted small opacity-50">© 2026 AI Learning Assistant</p>
		</div>
	</div>
	<div class="offcanvas offcanvas-start" tabindex="-1" id="notebookDrawer" style="width: 400px;">
		<div class="offcanvas-header bg-danger text-white">
			<h5 class="offcanvas-title fw-bold"><i class="fas fa-edit me-2"></i>我的错题库</h5>
			<button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
		</div>
		<div class="offcanvas-body p-3">
			<div id="mistakeList" class="list-group list-group-flush">
				<p class="text-center text-muted mt-5">正在加载错题本...</p>
			</div>
		</div>
	</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="{{ url_for('static', filename='js/ui-effects.js') }}"></script>
	<script src="{{ url_for('static', filename='js/search-engine.js') }}"></script>
	<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
	<script src="{{ url_for('static', filename='js/notebook.js') }}"></script>
	<script>
		// 初始化
		document.addEventListener('DOMContentLoaded', () => {
		    Dashboard.init();
		    Notebook.init();
		});
		window.MathJax = {
		        tex: {
		            inlineMath: [['$', '$'], ['\\(', '\\)']],
		            displayMath: [['$$', '$$'], ['\\[', '\\]']]
		        }
		    };
		document.addEventListener('click', function(e) {
		    // 如果点击的不是按钮也不是菜单内部，则关闭所有展开的菜单
		    if (!e.target.closest('.nav-category-btn') && !e.target.closest('.compact-sub-menu')) {
		        document.querySelectorAll('.compact-sub-menu.show').forEach(function(el) {
		            new bootstrap.Collapse(el, { toggle: false }).hide();
		        });
		    }
		});
	</script>
	<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js"></script>
</body>
</html>
