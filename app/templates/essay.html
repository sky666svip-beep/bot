<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能作文批改</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/essay.css') }}">
</head>
<body>
<div class="bg-blob-container">
    <div class="bg-blob bg-blob-purple"></div>
    <div class="bg-blob bg-blob-blue"></div>
</div>


<nav class="navbar navbar-expand-lg shadow-sm mb-4" style="background: linear-gradient(135deg, rgba(243,232,255,0.9) 0%, rgba(224,231,255,0.9) 25%, rgba(219,234,254,0.9) 50%, rgba(224,242,254,0.9) 75%, rgba(240,249,255,0.9) 100%); backdrop-filter: blur(10px);">
    <div class="container">
        <a class="navbar-brand" href="/" style="color: #6366f1;">
            <i class="fas fa-graduation-cap me-2"></i>智慧作文 | Intelligent Essay
        </a>
        <div class="navbar-nav ms-auto">
            <span class="nav-link active" style="color: #8b5cf6;">作文批改</span>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="main-card">
                <ul class="nav nav-pills mb-4 w-100" id="pills-tab" role="tablist">
                    <li class="nav-item flex-fill text-center" role="presentation">
                        <button class="nav-link active w-100" id="tab-chinese" data-bs-toggle="pill"
                                onclick="switchTheme('chinese')" type="button">
                            <i class="fas fa-book-open me-2"></i>语文作文
                        </button>
                    </li>
                    <li class="nav-item flex-fill text-center" role="presentation">
                        <button class="nav-link w-100" id="tab-english" data-bs-toggle="pill"
                                onclick="switchTheme('english')" type="button">
                            <i class="fas fa-language me-2"></i>英语作文
                        </button>
                    </li>
                </ul>

                <div class="input-area mb-3">
                    <div class="upload-btn-group d-flex justify-content-end gap-2 mb-2">
                        <input type="file" id="fileInput" hidden accept=".txt,.doc,.docx,.pdf">
                        <input type="file" id="imgInput" hidden accept="image/*">

                        <button type="button" class="btn" onclick="document.getElementById('fileInput').click()" title="支持 doc, docx, txt">
                            <i class="fas fa-file-alt me-1"></i>导入文档
                        </button>
                        <button type="button" class="btn" onclick="document.getElementById('imgInput').click()" title="拍照识别文字">
                            <i class="fas fa-camera me-1"></i>拍照识别
                        </button>
                    </div>

                    <textarea class="form-control" id="essayInput" rows="16"
                              placeholder="在此输入作文内容..."></textarea>
                </div>

                <button class="btn btn-submit w-100" onclick="submitCorrection()" id="submitBtn">
                    <i class="fas fa-magic me-2"></i>开始智能批改
                </button>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="main-card position-relative">
                <h5 class="fw-bold mb-4 pb-2 border-bottom">
                    <i class="fas fa-clipboard-check me-2 text-secondary"></i>批改报告
                </h5>

                <div id="loading" class="loading-container d-none">
                    <div class="spinner-border mb-3" role="status"></div>
                    <p class="animate-pulse">正在逐句批阅中...</p>
                </div>

                <div id="resultContent" class="result-section d-none">
                    </div>

                <div id="emptyState" class="text-center py-5 text-muted">
                    <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" width="120" style="opacity: 0.3; margin-bottom: 20px;">
                    <p>👈 请在左侧输入作文并点击“开始批改”</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/poll-helper.js') }}"></script>
<script src="{{ url_for('static', filename='js/essay.js') }}"></script>

<script>
    function switchTheme(mode) {
        if (mode === 'english') {
            document.body.classList.add('theme-english');
            if(typeof setMode === 'function') setMode('english');
        } else {
            document.body.classList.remove('theme-english');
            if(typeof setMode === 'function') setMode('chinese');
        }
    }
</script>
</body>
</html>
