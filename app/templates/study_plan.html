<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能学习规划</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/study_plan.css') }}">
</head>
<body class="light-theme">
    <div class="bg-decoration"></div>

    <div class="container-fluid p-0">
        <nav class="tech-nav d-flex justify-content-between align-items-center px-4 py-3">
            <div class="d-flex align-items-center gap-3">
                <a href="/" class="back-btn"><i class="fas fa-chevron-left"></i> 返回首页</a>
                <span class="brand-title">PLANNER <span class="text-secondary small">| 学习规划引擎</span></span>
            </div>
            <div class="status-indicator">
                <span class="dot"></span> 系统在线
            </div>
        </nav>

        <div class="main-layout row g-0">
            <div class="col-lg-3 col-md-4 config-panel p-4">
                <h5 class="panel-title mb-4"><i class="fas fa-sliders-h me-2"></i>定制学习计划</h5>

                <form id="planForm">
                    <div class="mb-3">
                        <label class="form-label">当前年级</label>
                        <select class="form-select tech-input" name="grade" id="gradeSelect">
                            <option value="初三">初三 (冲刺)</option>
                            <option value="初二">初二</option>
                            <option value="初一">初一</option>
                            <option value="高三">高三 (冲刺)</option>
                            <option value="高二">高二</option>
                            <option value="高一">高一</option>
                            <option value="小学">小学</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">今日聚焦学科 (可多选)</label>
                        <div class="subject-tags" id="subjectWrapper">
                            <div class="tech-checkbox" data-val="数学">数学</div>
                            <div class="tech-checkbox" data-val="英语">英语</div>
                            <div class="tech-checkbox" data-val="语文">语文</div>
                            <div class="tech-checkbox" data-val="物理">物理</div>
                            <div class="tech-checkbox" data-val="化学">化学</div>
                            <div class="tech-checkbox" data-val="生物">生物</div>
                            <div class="tech-checkbox" data-val="历史">历史</div>
                            <div class="tech-checkbox" data-val="政治">政治</div>
                            <div class="tech-checkbox" data-val="地理">地理</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label d-flex justify-content-between align-items-center">
                            <span>薄弱点描述</span>
                            <button type="button" class="btn btn-link p-0 text-primary" onclick="Planner.autoDiagnose()" style="font-size: 0.85rem; text-decoration: none;">
                                <i class="fas fa-wand-magic-sparkles me-1"></i>智能诊断
                            </button>
                        </label>
                        <input type="text" class="form-control tech-input" name="weakness" id="weaknessInput" placeholder="例：三角函数、文言文...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">计划开始时间</label>
                        <input type="time" class="form-control tech-input" id="startTime" value="19:00">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">可用时长</label>
                        <div class="range-wrapper d-flex align-items-center gap-2">
                            <input type="range" class="form-range tech-range" min="0.5" max="5" step="0.5" id="timeRange" value="2">
                            <span id="timeDisplay" class="text-primary fw-bold">2.0h</span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">本次目标</label>
                        <select class="form-select tech-input" name="goal">
                            <option value="日常补漏">日常查漏补缺</option>
                            <option value="考前冲刺">考前高强度冲刺</option>
                            <option value="作业辅导">作业与预习</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="button" class="btn btn-tech-primary" onclick="Planner.generate()">
                            <i class="fas fa-magic me-2"></i>生成智能学习计划
                        </button>
                        <button type="button" class="btn btn-tech-outline btn-sm" onclick="Planner.clearData()">
                            <i class="fas fa-trash-alt me-2"></i>重置
                        </button>
                    </div>
                </form>
            </div>

            <div class="col-lg-9 col-md-8 content-panel p-4">

                <div id="loadingState" class="d-none text-center pt-5">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <p class="text-muted animate-pulse">正在生成学习计划...</p>
                </div>

                <div id="emptyState" class="text-center pt-5">
                    <div class="empty-icon mb-3 text-primary" style="font-size: 3rem;"><i class="fas fa-clipboard-list"></i></div>
                    <h3 class="text-dark">准备好开始学习了吗？</h3>
                    <p class="text-muted opacity-75">请在左侧配置您的学习参数，点击“生成”</p>
                </div>

                <div id="resultArea" class="d-none fade-in">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="section-title text-dark mb-0 border-0 p-0">今日规划</h5>
                        <button class="btn btn-sm btn-outline-success" onclick="Planner.saveAsImage()">
                            <i class="fas fa-download me-1"></i>保存计划卡片
                        </button>
                    </div>

                    <div id="planCardExport" class="p-3 bg-white rounded shadow-sm">
                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <div class="tech-card p-3 d-flex align-items-center h-100 bg-light border-0">
                                    <div class="icon-box me-3 text-primary fs-3"><i class="fas fa-brain"></i></div>
                                    <div>
                                        <h6 class="text-muted small mb-1">学情分析</h6>
                                        <p class="mb-0 text-dark" id="aiAnalysis">...</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="tech-card p-3 text-center h-100 bg-light border-0">
                                    <h6 class="text-muted small">计划完成率</h6>
                                    <div class="progress-ring" id="progressChart" style="height: 60px;"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row g-4">
                            <div class="col-lg-7">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="text-muted">执行清单</h6>
                                    <div class="btn-group btn-group-sm">
                                        <button class="btn btn-outline-primary active" onclick="Planner.filterTasks('all')">全部</button>
                                        <button class="btn btn-outline-primary" onclick="Planner.filterTasks('High')">高优</button>
                                    </div>
                                </div>
                                <div class="task-list" id="taskListContainer">
                                    </div>
                            </div>

                            <div class="col-lg-5">
                                <h6 class="text-muted mb-3">时间分配</h6>
                                <div class="tech-card p-3 mb-3 bg-white border">
                                    <div id="subjectPieChart" style="height: 200px;"></div>
                                </div>
                                <h6 class="text-muted mb-3">任务类型</h6>
                                <div class="tech-card p-3 bg-white border">
                                    <div id="typeBarChart" style="height: 180px;"></div>
                                </div>
                            </div>
                        </div>

                        <div class="text-center mt-3 text-muted small d-none show-on-export">
                            —— 生成自 ChoiceBot 智能学习助手 ——
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="taskDetailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title text-primary"><i class="fas fa-lightbulb me-2"></i>学习建议</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="modalMethod" class="text-secondary mb-0"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/study_plan.js') }}"></script>
</body>
</html>
