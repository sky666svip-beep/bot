<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 智能答题助手</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">开启您的智能学习之旅</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert-error">
                        <i class="fas fa-exclamation-circle"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div style="margin-bottom: 1rem;">
                <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: #475569;">用户名</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus placeholder="2-20个字符">
            </div>

            <div style="margin-bottom: 1rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: #475569;">密码</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="至少6个字符">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="confirm" style="display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: #475569;">确认密码</label>
                <input type="password" id="confirm" name="confirm" class="form-control" required placeholder="请再次输入密码">
            </div>

            <button type="submit" class="btn-auth">
                <i class="fas fa-user-plus me-2"></i> 注册账号
            </button>
        </form>

        <div class="auth-footer">
            已有账号？ <a href="{{ url_for('auth.login') }}">直接登录</a>
        </div>
    </div>
</body>
</html>
