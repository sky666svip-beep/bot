<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>智能模拟考试 - 自动答题助手</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
	<style>
		.option-card {
		  cursor: pointer;
		  transition: all 0.2s;
		  border: 1px solid rgba(224, 231, 255, 0.6);
		  background: rgba(255, 255, 255, 0.5);
		  border-radius: 12px;
		}
		.option-card:hover {
		  background: var(--gradient-soft-blue-purple);
		  border-color: #a5b4fc;
		}
		.option-card.selected {
		  background: var(--gradient-soft-blue-purple); 
		  border-color: #6366f1;
		  color: #6366f1;
		  font-weight: bold;
		}
		.option-card.correct {
		  background: linear-gradient(135deg, rgba(209,250,229,0.8) 0%, rgba(167,243,208,0.8) 100%);
		  border-color: #10b981;
		  color: #047857;
		}
		.option-card.wrong {
		  background: linear-gradient(135deg, rgba(254,226,226,0.8) 0%, rgba(254,202,202,0.8) 100%);
		  border-color: #ef4444;
		  color: #b91c1c;
		}
		
		.question-card {
		  animation: fadeIn 0.5s ease;
		}
		
		@keyframes fadeIn {
		  from { opacity: 0; transform: translateY(10px); }
		  to { opacity: 1; transform: translateY(0); }
		}
		
		.loading-overlay {
		  position: absolute;
		  top: 0;
		  left: 0;
		  width: 100%;
		  height: 100%;
		  background: var(--gradient-soft-blue-purple);
		  display: flex;
		  justify-content: center;
		  align-items: center;
		  z-index: 10;
		  border-radius: 15px;
		  -webkit-backdrop-filter: blur(8px);
		  backdrop-filter: blur(8px);
		}
		
		/* 分数显示 - 五色渐变 */
		.score-display {
		  font-size: 3rem;
		  font-weight: 800;
		  background: linear-gradient(135deg, #a855f7 0%, #6366f1 25%, #3b82f6 50%, #0ea5e9 75%, #06b6d4 100%);
		  -webkit-background-clip: text;
		  background-clip: text;
		  color: transparent;
		}
		
		/* 表单控件 - 五色渐变风格 */
		.form-select, .form-control {
		  background: var(--gradient-soft-blue-purple); 
		  border: 1px solid rgba(224, 231, 255, 0.6);
		  transition: all 0.3s;
		}
		.form-select:focus, .form-control:focus {
		  background: var(--gradient-soft-blue-purple); 
		  border-color: #6366f1;
		  box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.15);
		}
		
		/* Checkbox 样式 */
		.form-check-input {
		  background-color: rgba(255, 255, 255, 0.5);
		  border: 1px solid rgba(224, 231, 255, 0.8);
		}
		.form-check-input:checked {
		  background-color: #6366f1;
		  border-color: #6366f1;
		}
		.form-check-input:focus {
		  box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.15);
		}
		
		/* Range slider 样式 */
		.form-range::-webkit-slider-runnable-track {
		  background: var(--gradient-soft-blue-purple);
		}
		.form-range::-webkit-slider-thumb {
		  background: #6366f1;
		}
		.form-range:focus::-webkit-slider-thumb {
		  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
		}
		
		.glow-btn-inner:hover {
		  background: var(--gradient-soft-blue-purple); 
		}
		.glow-btn-inner:focus,
		.glow-btn-inner:active {
		  background: var(--gradient-soft-blue-purple);
		  outline: none;
		  box-shadow: none;
		}
	</style>
</head>
<body>
	<!-- 五色渐变背景 -->
	<div class="bg-blob-container">
		<div class="bg-blob bg-blob-purple"></div>
		<div class="bg-blob bg-blob-blue"></div>
	</div>
	<div id="sakura-container"></div>
	<!-- 导航栏 - 五色渐变风格 -->
	<nav class="navbar navbar-expand-lg shadow-sm mb-4" backdrop-filter: blur(10px);">
		<div class="container">
			<a class="navbar-brand fw-bold" style="color: #6366f1;" href="/">
				<i class="fas fa-robot me-2"></i>自动答题助手 </a>
			<span class="navbar-text ms-3 border-start ps-3" style="color: #64748b;"> 智能模拟考试 </span>
			<div class="ms-auto">
				<a href="/" class="btn btn-sm rounded-pill px-3" style="border: 2px solid #8b5cf6; color: #8b5cf6;">
					<i class="fas fa-home me-1"></i>返回首页 </a>
			</div>
		</div>
	</nav>
	<div class="container pb-5">
		<!-- 1. 筛选区 -->
		<div class="row justify-content-center" id="filterSection">
			<div class="col-lg-8">
				<div class="card main-card p-4">
					<div class="text-center mb-4">
						<h3 class="fw-bold text-primary-gradient">定制你的模拟考试</h3>
						<p class="text-muted">基于答题助手生成个性化试卷</p>
					</div>
					<form id="examForm">
						<div class="row g-3">
							<div class="col-md-6">
								<label class="form-label fw-bold"><i class="fas fa-book me-2 text-primary"></i>科目</label>
								<select class="form-select" id="subject" required>
									<option value="语文">语文</option>
									<option value="数学" selected>数学</option>
									<option value="英语">英语</option>
									<option value="物理">物理</option>
									<option value="化学">化学</option>
									<option value="历史">历史</option>
									<option value="地理">地理</option>
									<option value="生物">生物</option>
									<option value="计算机">计算机</option>
								</select>
							</div>
							<div class="col-md-6">
								<label class="form-label fw-bold"><i class="fas fa-graduation-cap me-2 text-info"></i>年级</label>
								<select class="form-select" id="grade">
									<option value="小学">小学</option>
									<option value="初中" selected>初中</option>
									<option value="高中">高中</option>
								</select>
							</div>
							<div class="col-12">
								<label class="form-label fw-bold"><i class="fas fa-tag me-2 text-warning"></i>核心知识点</label>
								<input type="text" class="form-control" id="keypoint" placeholder="例如：二次函数、力学、定语从句..." required>
							</div>
							<div class="col-12">
								<label class="form-label fw-bold mb-2"><i class="fas fa-shapes me-2 text-success"></i>题型</label>
								<div class="d-flex gap-3 flex-wrap">
									<div class="form-check">
										<input class="form-check-input" type="checkbox" value="单选题" id="type1" checked>
										<label class="form-check-label" for="type1">单选题</label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="checkbox" value="判断题" id="type2">
										<label class="form-check-label" for="type2">判断题</label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="checkbox" value="填空题" id="type3">
										<label class="form-check-label" for="type3">填空题</label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="checkbox" value="简答题" id="type4">
										<label class="form-check-label" for="type4">简答题</label>
									</div>
								</div>
							</div>
							<div class="col-12">
								<label class="form-label fw-bold"><i class="fas fa-layer-group me-2 text-secondary"></i>题目数量: <span id="countVal" class="text-primary">3</span></label>
								<input type="range" class="form-range" id="count" min="1" max="10" value="3" oninput="document.getElementById('countVal').innerText=this.value">
							</div>
							<div class="col-12 mt-4">
								<button type="submit" class="btn btn-modern btn-primary-gradient w-100 py-3">
									<i class="fas fa-magic me-2"></i>生成试题 </button>
							</div>
						</div>
					</form>
					<!-- 加载遮罩 -->
					<div id="loadingMask" class="loading-overlay" style="display: none;">
						<div class="text-center">
							<div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
							<p class="h5 text-primary fw-bold" id="loadingText">正在出题...</p>
							<small class="text-muted">这可能需要几秒钟，请稍候</small>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!-- 2. 答题区 (初始隐藏) -->
		<div id="examArea" style="display: none;">
			<div class="d-flex justify-content-between align-items-center mb-4">
				<h4 class="fw-bold"><i class="fas fa-edit me-2"></i>答题中...</h4>
				<div class="badge bg-light text-dark border p-2 fs-6">
					<i class="far fa-clock me-1"></i>此试卷由答题助手实时生成
				</div>
			</div>
			<div id="questionsContainer">
				<!-- 题目卡片将插入这里 -->
			</div>
			<div class="text-center mt-5">
				<button onclick="ExamApp.submitExam()" class="btn btn-modern btn-success w-50 py-3 fs-5 shadow">
					<i class="fas fa-check-double me-2"></i>提交答案 </button>
			</div>
		</div>
		<!-- 3. 结果区 (初始隐藏) -->
		<div id="resultArea" style="display: none;" class="mt-4">
			<div class="card main-card p-5 text-center mb-5">
				<h2 class="text-muted mb-3">考试得分</h2>
				<div class="score-display mb-3" id="finalScore">0</div>
				<p id="scoreComment" class="text-muted mb-4">继续加油！</p>
				<div class="d-flex justify-content-center gap-3">
					<button onclick="location.reload()" class="btn btn-outline-primary rounded-pill px-4">
						<i class="fas fa-redo me-2"></i>再来一套 </button>
					<a href="{{ url_for('main.view_history') }}" class="btn btn-outline-secondary rounded-pill px-4">
						<i class="fas fa-history me-2"></i>查看历史 </a>
				</div>
			</div>
			<h4 class="fw-bold mb-3"><i class="fas fa-search-plus me-2"></i>试卷解析</h4>
			<div id="analysisContainer">
				<!-- 解析内容插入这里 -->
			</div>
		</div>
	</div>
	<!-- 错题本侧边栏 (复用 logic) -->
	<div class="offcanvas offcanvas-start" tabindex="-1" id="notebookDrawer" style="width: 400px;">
		<div class="offcanvas-header bg-danger text-white">
			<h5 class="offcanvas-title fw-bold"><i class="fas fa-edit me-2"></i>我的错题本</h5>
			<button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
		</div>
		<div class="offcanvas-body p-3">
			<div id="mistakeList" class="list-group list-group-flush">
				<p class="text-center text-muted mt-5">正在加载错题本...</p>
			</div>
		</div>
	</div>
	<!-- 浮动错题本按钮 -->
	<button class="btn btn-warning rounded-circle shadow-lg position-fixed bottom-0 end-0 m-4 p-3" style="width: 60px; height: 60px; z-index: 1000;" onclick="Notebook.refreshAll(); new bootstrap.Offcanvas(document.getElementById('notebookDrawer')).show();">
		<i class="fas fa-book-open text-white fs-4"></i>
	</button>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<!-- 复用特效与逻辑 -->
	<script src="{{ url_for('static', filename='js/ui-effects.js') }}"></script>
	<script src="{{ url_for('static', filename='js/notebook.js') }}"></script>
	<!-- 独立的考试逻辑 -->
	<script src="{{ url_for('static', filename='js/simulation-exam.js') }}"></script>
	<script>
		window.MathJax = {
		    tex: {
		        inlineMath: [['$', '$'], ['\\(', '\\)']],
		        displayMath: [['$$', '$$'], ['\\[', '\\]']]
		    }
		};
	</script>
	<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js"></script>
</body>
</html>
